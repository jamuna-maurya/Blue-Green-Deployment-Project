services:

  blue:
    build: ./app-blue
    container_name: blue-app
    ports:
      - "3001:3000"

  green:
    build: ./app-green
    container_name: green-app
    ports:
      - "3002:3000"

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - blue
      - green
